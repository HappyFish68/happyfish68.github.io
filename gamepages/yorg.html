<link rel="stylesheet" href="game.css">

<button id="openBtn">Open Yorg.io</button>

<script>
document.getElementById("openBtn").addEventListener("click", function () {
    const newWin = window.open("about:blank", "_blank");

    if (newWin) {
        newWin.document.write(`
            <html>
            <head>
                <title>Yorg.io</title>
                <style>
                    html, body {
                        margin: 0;
                        padding: 0;
                        height: 100%;
                        overflow: hidden;
                    }
                    iframe {
                        width: 100%;
                        height: 100%;
                        border: none;
                    }
                </style>
            </head>
            <body>
                <iframe src="https://yorg.io"></iframe>
            </body>
            </html>
        `);
        newWin.document.close();
    }
});
</script>
